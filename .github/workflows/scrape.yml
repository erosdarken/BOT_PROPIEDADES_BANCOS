name: Propiedades - Scraper

on:
  schedule:
    - cron: "*/10 * * * *" # cada 10 minutos
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: prop-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: "1"

          # ✅ Evitar 429 (Too Many Requests) y spam
          MAX_SEND: "15"
          SLEEP_BETWEEN_MSG: "1.5"

          # ✅ Debug opcional (ponlo en "1" si quieres ver status codes y tamaño HTML)
          DEBUG_HTTP: "0"
        run: |
          python -u bot.py

      - name: Commit state.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain)" ]]; then
            git add state.json
            git commit -m "Update state.json (new properties detected)"
            git push
          else
            echo "No changes to commit."
          fi
